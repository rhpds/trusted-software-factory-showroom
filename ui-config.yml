---
type: showroom

default_width: 40
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
  - name: Terminal
    path: /wetty
    port: 443

  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'
    external: false

  - name: Konflux
    url: 'https://konflux-ui-konflux-ui.${DOMAIN}'
    external: false

  - name: GitLab
    url: 'https://gitlab-gitlab.${DOMAIN}'
    external: false
