---
type: showroom

# Set the left column width to 40%
default_width: 40
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
  # OCP Console
  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'

  # Bastion terminal
  - name: Terminal
    path: /wetty
    port: 443
